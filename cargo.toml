[package]
name = "B-O-B"
version = "0.1.0"
edition = "2024"

[dependencies]
emoji = { git = "https://github.com/philocalyst/emoji-rs" }
emoji_search = { git = "https://github.com/philocalyst/emoji_search"}
gpui = "0.2.2"
unicode-segmentation = "1.12.0"
imekit = "0.1.0"
global-hotkey = "0.7.0"
daemonize = "0.5.0"
service-manager = "0.10.0"
enigo = "0.6.1"
mouse_position = "0.1.4"
nonempty = "0.12.0"
serde = { version = "1.0.228", features = ["derive"] }
gpui-component = "0.5.1"
tracing = "0.1.44"
tracing-subscriber = "0.3.22"
tracing-appender = "0.2.4"
tracing-oslog = "0.3.0"

[target.'cfg(target_os = "macos")'.dependencies]
objc2-app-kit = "0.3.2"
objc2 = "0.6.4"
objc = "0.2.7"
core-text = "=21.0.0"
cocoa = "0.26.0"

[package.metadata.packager]
before-packaging-command = "cargo build --release"
product-name = "BOB"
identifier = "com.philocalyst.BOB"
resources = ["Cargo.toml", "src"]

[package.metadata.packager.macos]
background-app = true # To try and avoid the app icon

[package.metadata.bundle]
identifier = "com.philocalyst.BOB"

icon = [
  "./icon.ico",   
]

copyright = "Copyright © 2026 philocalyst. All rights reserved."

category = "Utility"

short_description = "A fast, keyboard-driven emoji picker."
osx_info_plist_exts = [ "./hide-from-dock.plist" ]

long_description = """
B.O.B (BOB prOffers flamBoyance) is a lightweight emoji picker that lives in your menu bar.
Trigger it with a global hotkey, search by name or keyword, and
insert the emoji directly into any focused input field.
"""

# MIME types assigned to the MimeType= field of the .desktop file.
linux_mime_types = ["text/plain"]

linux_use_terminal = false

deb_depends = [
  "libxdo3",          # enigo uses xdo on Linux for input injection
]

# Minimum macOS version the app supports.
osx_minimum_system_version = "13.0"

# URL schemes this app registers as a handle.
osx_url_schemes = ["B.O.B"]

